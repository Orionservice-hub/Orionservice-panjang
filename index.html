<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrionService Security</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#050505;
    color:white;
    overflow:hidden;
    height:100vh;
}

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#ff000020 0%,transparent 40%),
    radial-gradient(circle at bottom right,#0066ff20 0%,transparent 40%);
}

.grid{
    position:absolute;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:40px 40px;
}

.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:700px;
    max-width:90%;
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#ff3333,#0066ff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
    box-shadow:
        0 0 30px rgba(255,0,0,.5),
        0 0 50px rgba(0,102,255,.5);
}

.status{
    color:#22c55e;
    margin-top:20px;
    letter-spacing:2px;
    font-size:13px;
}

h1{
    margin-top:15px;
    font-size:55px;
    background:linear-gradient(90deg,#ff4444,#4488ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    margin-top:15px;
    color:#9ca3af;
    line-height:1.8;
}

.badges{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:25px;
}

.badge{
    padding:10px 18px;
    border-radius:999px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
}

.footer{
    margin-top:30px;
    color:#666;
    font-size:13px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="card">

<div class="logo">O</div>

<div class="status">
● ORIONSERVICE SECURITY ACTIVE
</div>

<h1>Access Denied</h1>

<p class="desc">
This endpoint is protected by OrionService.<br>
Unauthorized access attempts are monitored and logged.
</p>

<div class="badges">
<div class="badge">Protected</div>
<div class="badge">Encrypted</div>
<div class="badge">Security Gateway</div>
<div class="badge">OrionService</div>
</div>

<div class="footer">
OrionService Security Gateway © 2026
</div>

</div>

<!-- ==========================================
     ORIONSERVICE SOURCE STORAGE
=========================================== -->

<script id="orion-source" type="text/plain">

print("OrionService Loaded")

</script>

<!-- ==========================================
     ORIONSERVICE SOURCE STORAGE END
=========================================== -->

</body>
</html>
